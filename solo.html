<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kelvi Solo — a thinking partner for independent math learners.">
<title>Kelvi Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EE;
  --surface: #ECE7DC;
  --divider: #CDC3B1;
  --text-primary: #2F2B25;
  --text-muted: #6F6A61;
  --accent: #5A7080;
  --accent-hover: #48606E;
  --white: #FFFFFF;
  --font-heading: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  color: var(--text-primary);
  background: var(--bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  animation: pageIn 0.5s ease-out;
}
@keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--divider);
  transition: box-shadow 0.3s ease;
}
nav.scrolled { box-shadow: 0 1px 12px rgba(47,43,37,0.06); }
.nav-inner {
  max-width: 1120px; margin: 0 auto; padding: 0 2rem;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
}
.wordmark {
  font-family: var(--font-heading); font-size: 1.5rem;
  color: var(--accent); text-decoration: none; letter-spacing: -0.01em;
  display: flex; align-items: center;
}
.product-label {
  font-family: var(--font-body); font-size: 0.75rem;
  font-weight: 500; color: var(--text-muted); margin-left: 0.5rem;
}
.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-links a {
  font-size: 0.9rem; color: var(--text-muted); text-decoration: none;
  transition: color 0.2s ease; font-weight: 500;
}
.nav-links a:hover { color: var(--text-primary); }

.hamburger {
  display: none; background: none; border: none; cursor: pointer;
  width: 28px; height: 20px; position: relative;
}
.hamburger span {
  display: block; width: 100%; height: 2px; background: var(--text-primary);
  position: absolute; left: 0; transition: all 0.3s ease;
}
.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }
.hamburger.open span:nth-child(1) { top: 9px; transform: rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { top: 9px; transform: rotate(-45deg); }

.container { max-width: 1120px; margin: 0 auto; padding: 0 2rem; }

.hero { padding: 10rem 0 5rem; }
.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  line-height: 1.15; color: var(--text-primary);
  max-width: 600px; margin-bottom: 1.5rem; letter-spacing: -0.02em;
}
.subhead {
  font-size: 1.15rem; color: var(--text-muted);
  max-width: 540px; line-height: 1.7; margin-bottom: 2.5rem;
}
.math-line {
  font-size: 0.88rem; color: var(--text-muted);
  max-width: 540px; margin-bottom: 2.5rem; line-height: 1.6;
}
.math-line strong { color: var(--text-primary); font-weight: 600; }

.entry-row {
  display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
  max-width: 480px; margin-bottom: 0.75rem;
}
.entry-row input {
  flex: 1; min-width: 220px;
  padding: 0.85rem 1.25rem;
  border: 1.5px solid var(--divider); border-radius: 8px;
  font-size: 1rem; font-family: var(--font-body);
  background: var(--white); color: var(--text-primary);
  outline: none; transition: border-color 0.15s;
}
.entry-row input:focus { border-color: var(--accent); }
.entry-row input::placeholder { color: var(--divider); }
.btn-primary {
  padding: 0.85rem 2rem;
  background: var(--accent); color: var(--white); border: none; border-radius: 8px;
  font-family: var(--font-body); font-size: 1rem; font-weight: 500;
  cursor: pointer; transition: background 0.2s ease; white-space: nowrap;
}
.btn-primary:hover { background: var(--accent-hover); }
.entry-error {
  font-size: 0.82rem; color: #993C1D; display: none; margin-bottom: 0.5rem;
}
.entry-error.visible { display: block; }
.entry-note { font-size: 0.85rem; color: var(--text-muted); }

.fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
  .nav-links {
    display: none; flex-direction: column; gap: 1.5rem;
    position: absolute; top: 64px; left: 0; right: 0;
    background: var(--bg); border-bottom: 1px solid var(--divider); padding: 1.5rem 2rem;
  }
  .nav-links.open { display: flex; }
  .hamburger { display: block; }
  .hero { padding-top: 8rem; }
}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <a href="index.html" class="wordmark">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;margin-right:8px">
        <circle cx="14" cy="6" r="5" fill="#B8784E"/>
        <circle cx="6" cy="21" r="5" fill="#3A6B5C"/>
        <circle cx="22" cy="21" r="5" fill="#5A7080"/>
      </svg>Kelvi<span class="product-label">Solo</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="school.html">School</a>
      <a href="family.html">Family</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <h1 class="fade-in">Start thinking.</h1>
    <p class="subhead fade-in">Kelvi doesn't tutor. It doesn't give away the answers. It helps you ask the questions you needed to ask yourself — and it knows that <strong>M</strong>istakes <strong>A</strong>llow <strong>T</strong>hinking to <strong>H</strong>appen.</p>
    <div class="fade-in">
      <div class="entry-row">
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
        <button class="btn-primary" onclick="handleEnter()">Start thinking</button>
      </div>
      <p class="entry-error" id="error">Please enter a valid email address.</p>
      <p class="entry-note">No account needed yet — we're in early access.</p>
    </div>
  </div>
</section>

<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });
  document.getElementById('hamburger').addEventListener('click', function() {
    this.classList.toggle('open');
    document.getElementById('navLinks').classList.toggle('open');
  });
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleEnter();
  });

  function handleEnter() {
    const email = document.getElementById('email').value.trim();
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!valid) {
      document.getElementById('error').classList.add('visible');
      return;
    }
    document.getElementById('error').classList.remove('visible');
    localStorage.setItem('kelvi_solo_email', email);
    window.location.href = 'solo-app.html';
  }
</script>

</body>
</html>
