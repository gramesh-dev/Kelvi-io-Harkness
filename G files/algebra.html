<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelvi · Algebra Solar System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'OpenDyslexic';src:url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/fonts/OpenDyslexic-Regular.otf') format('opentype')}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
:root{
  --bg:#E3EEFF;--surface:rgba(255,255,255,0.4);--deeper:#E0D8C8;--divider:rgba(0,0,0,0.1);
  --text-primary:#2F2B25;--text-muted:#6F6A61;--text-faint:#9A9488;
  --accent:#3A6B5C;--accent-dark:#2D5347;--accent-light:#EBF3EF;
  --family:#B8784E;--family-dark:#9E6640;--family-light:#F5EDE5;
  --gold:#C9A84C;
  --font-heading:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;--font-serif:'DM Sans',serif;
}
.scene{position:fixed;inset:0;display:flex;flex-direction:column}
/* ── GEOMETRY V4 ── */
/* ── GEOMETRY CONCEPT MAP ── */
.geo-scene{position:absolute;inset:0;background:#E3EEFF;display:flex;flex-direction:column;overflow:hidden}
.geo-scene::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:100;background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(55,138,221,0.12) 100%)}
.geo-topbar{display:flex;align-items:center;gap:14px;padding:14px 24px;flex-shrink:0;z-index:20;background:#E3EEFF;border-bottom:none}
.geo-planet-sphere{width:40px;height:40px;flex-shrink:0;filter:drop-shadow(0 3px 10px rgba(160,125,74,0.5))}
.geo-planet-info{flex:1}
.geo-planet-name{font-family:var(--font-heading);font-size:1.1rem;color:#2979FF;line-height:1;font-weight:700;font-style:normal;text-transform:uppercase;letter-spacing:0.08em}
.geo-planet-tagline{font-family:var(--font-body);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(110,100,85,0.55);margin-top:3px}
.geo-back-btn{background:none;border:1px solid rgba(110,100,85,0.25);padding:5px 12px;border-radius:14px;font-size:12px;color:rgba(80,70,55,0.7);cursor:pointer;font-family:var(--font-body);transition:all .15s}
.geo-back-btn:hover{border-color:#7B6BB5;color:#7B6BB5}
/* map canvas */
.geo-map-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.geo-svg{position:absolute;inset:0;width:100%;height:100%;cursor:default}
/* hero overlay — slides up from bottom */
.geo-hero-overlay{position:absolute;bottom:0;left:0;right:0;z-index:30;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,.61,.36,1);pointer-events:none;background:#FFFFFF;border-top:1px solid #F0F0F0}
.geo-hero-overlay.open{transform:translateY(0);pointer-events:auto}
.geo-hero-inner{padding:28px 32px 20px;max-width:680px}
.geo-hero-eyebrow{font-family:var(--font-body);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6B6B6B;margin-bottom:10px;font-weight:700}
.geo-hero-prompt-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.geo-hero-prompt{font-family:'DM Sans',sans-serif;font-style:normal;font-size:clamp(20px,2.8vw,32px);color:#1C1917;line-height:1.25;flex:1;font-weight:800;letter-spacing:-0.02em}
.geo-speak-btn{flex-shrink:0;background:#F4F4F4;border:1px solid #E0E0E0;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;transition:all .15s;margin-top:4px}
.geo-speak-btn:hover{background:#E3EEFF;color:#2979FF}
.geo-speak-btn .speak-icon{display:flex;align-items:center}
.geo-hero-sub{font-family:var(--font-body);font-size:13px;color:#888;line-height:1.6;margin-bottom:18px}
.geo-hero-ctas{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.geo-btn-primary{background:#2979FF;color:#FFFFFF;padding:11px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .12s}
.geo-btn-primary:hover{background:#2979FFcc}
.geo-btn-secondary{background:none;border:1px solid #E0E0E0;border-radius:8px;color:#888;padding:11px 14px;font-size:13px;cursor:pointer;font-family:var(--font-body);transition:color .12s}
.geo-btn-secondary:hover{color:#333;border-color:#AAAAAA}
.geo-dismiss{position:absolute;top:14px;right:18px;background:#F4F4F4;border:1px solid #E0E0E0;color:#555;font-size:17px;cursor:pointer;line-height:1;font-family:var(--font-body);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.geo-dismiss:hover{background:#E8E8E8;color:#333}
/* ── TOPBAR ADDITIONS ── */
.topbar-nav{display:flex;gap:4px;align-items:center}
.topbar.space-mode .topbar-tab{color:rgba(240,232,204,0.65)}
.topbar.space-mode .topbar-tab:hover{color:#fff;background:rgba(255,255,255,0.08)}
.topbar.space-mode .topbar-tab.active{background:rgba(184,120,78,0.18);color:#F5E6A8}
.settings-btn{background:none;border:none;color:rgba(240,232,204,0.65);cursor:pointer;padding:4px 6px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.settings-btn:hover{color:#F5E6A8;background:rgba(255,255,255,0.08)}
.topbar.light-mode .settings-btn{color:var(--text-muted)}
.topbar.light-mode .settings-btn:hover{color:#2979FF;background:#E3EEFF}

/* ── PLANET VIEW ── */
.planet-scene{position:absolute;inset:56px 0 0 0;background:var(--bg);overflow-y:auto}
.planet-header{
  padding:48px 40px 30px;text-align:center;position:relative;
  background:linear-gradient(180deg, rgba(232,216,184,0.35) 0%, var(--bg) 100%);
  border-bottom:1px solid var(--divider);
}
.planet-back{
  position:absolute;top:16px;left:20px;background:none;border:1px solid var(--divider);
  padding:6px 14px;border-radius:20px;font-size:12px;color:var(--text-muted);
  display:flex;align-items:center;gap:6px;transition:all .15s;cursor:pointer;font-family:var(--font-body);
}
.planet-back:hover{border-color:#2979FF;color:#2979FF}
.planet-visual{
  width:120px;height:120px;border-radius:50%;margin:0 auto 20px;
  background:radial-gradient(circle at 35% 30%, #DCC094 0%, #A07D4A 55%, #6C502C 100%);
  box-shadow:0 4px 30px rgba(160,125,74,0.3);position:relative;
  animation:planetFloat 6s ease-in-out infinite;
}
.planet-visual::after{
  content:'';position:absolute;width:170%;height:22%;left:-35%;top:40%;border-radius:50%;
  background:linear-gradient(to bottom, transparent 30%, rgba(160,125,74,0.5) 50%, transparent 70%);
  transform:rotate(-16deg);
}
@keyframes planetFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.planet-title{font-family:var(--font-heading);font-size:2.6rem;letter-spacing:-0.01em;margin-bottom:8px}
.planet-tagline{font-family:'DM Sans',sans-serif;font-style:italic;color:var(--text-muted);font-size:15px;max-width:500px;margin:0 auto 10px;line-height:1.5}
.planet-meta{display:inline-flex;gap:24px;margin-top:10px;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase}
.planet-meta strong{color:var(--text-primary);font-family:var(--font-body);font-weight:600;font-size:13px;display:block;letter-spacing:0;text-transform:none;margin-bottom:2px}
.levels-wrap{max-width:1280px;margin:0 auto;padding:40px}
.levels-intro{text-align:center;margin-bottom:30px;color:var(--text-muted);font-size:14px;line-height:1.6;max-width:640px;margin-left:auto;margin-right:auto}
.levels-grid{display:grid;grid-template-columns:repeat(5, 1fr);gap:16px}
.level-col{background:#fff;border:1px solid var(--divider);border-radius:14px;padding:20px 18px 24px;min-height:540px;position:relative;transition:all .2s ease}
.level-col:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(47,43,37,0.08)}
.level-col::before{content:'';position:absolute;top:0;left:16px;right:16px;height:3px;border-radius:0 0 3px 3px}
.level-col.l1::before{background:#E09C50}
.level-col.l2::before{background:#D8AA58}
.level-col.l3::before{background:#3E9282}
.level-col.l4::before{background:#5286B4}
.level-col.l5::before{background:#6856A8}
.level-num{font-family:var(--font-heading);font-style:italic;font-size:1rem;color:var(--text-muted);letter-spacing:0.05em}
.level-name{font-family:var(--font-heading);font-size:1.4rem;letter-spacing:-0.01em;margin-bottom:6px;margin-top:-2px}
.level-pcg{display:inline-block;padding:3px 8px;border-radius:8px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600}
.pcg-p{background:#F5DDD3;color:#8A4B1E}
.pcg-c{background:#D6E8DC;color:#2D5347}
.pcg-g{background:#E8DDF0;color:#48366E}
.level-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin:12px 0 18px;min-height:48px}
.activity{background:var(--bg);border:1px solid var(--divider);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s ease;position:relative}
.activity:hover{background:#E3EEFF;border-color:#2979FF;transform:translateY(-1px)}
.activity-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:4px}
.activity-prompt{font-size:11px;color:var(--text-muted);line-height:1.5;font-style:italic}
.activity-visited{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold)}

/* ── CHAT ── */
.chat-scene{position:absolute;inset:56px 0 0 0;display:flex;flex-direction:column;background:#FFFFFF}
.chat-header{padding:14px 28px;border-bottom:1px solid #F0F0F0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex-shrink:0}
.chat-back{font-size:13px;color:#333;font-weight:500;background:none;border:none;display:flex;align-items:center;gap:4px;cursor:pointer;font-family:var(--font-body);justify-self:start}
.chat-back:hover{color:#0046C7}
.chat-topic{text-align:center}
.chat-kicker{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#888;font-weight:600;margin-bottom:2px}
.chat-activity-title{font-family:var(--font-heading);font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.chat-header-right{justify-self:end;display:flex;align-items:center;gap:8px}
.dyslexic-toggle{background:none;border:1px solid var(--divider);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);transition:all .15s}
.dyslexic-toggle:hover{border-color:#2979FF;color:#2979FF}
.dyslexic-toggle.on{border-color:#2979FF;background:#E3EEFF;color:#2979FF}
.activity-banner{padding:24px 32px;background:#FFFFFF;border-bottom:1px solid #F0F0F0;flex-shrink:0}
.activity-banner-text{flex:1}
.activity-banner-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6B6B6B;margin-bottom:10px;font-family:var(--font-body)}
.activity-banner-prompt{font-size:clamp(22px,3vw,36px);line-height:1.2;color:#1C1917;font-style:normal;font-family:'DM Sans',sans-serif;font-weight:800;letter-spacing:-0.02em}
.activity-banner-speak{flex-shrink:0;background:none;border:1px solid var(--divider);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .15s;margin-top:2px}
.activity-banner-speak:hover{background:#E3EEFF;color:#2979FF;border-color:#2979FF}
body.dyslexic .activity-banner-prompt,body.dyslexic .msg-bubble-k,body.dyslexic .msg-bubble-s,body.dyslexic .chat-input{flex:1;border:1.5px solid #E0E0E0;border-radius:16px;padding:12px 16px;font-size:14px;font-family:var(--font-body);outline:none;resize:none;max-height:120px;background:#FFFFFF;color:#1C1917;transition:border-color .15s}
.chat-msgs{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:18px;max-width:820px;margin:0 auto;width:100%}
.msg{max-width:100%;animation:fadeUp .3s ease}
.msg-k{align-self:flex-start;width:100%}
.msg-s{align-self:flex-end;max-width:72%}
.msg-name{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;padding-left:2px;color:var(--text-faint)}
.msg-name-s{text-align:right;padding-right:2px}
.msg-bubble-k{background:transparent;border:none;padding:0;font-size:14px;line-height:1.75;color:var(--text-primary);white-space:pre-wrap}
.msg-bubble-s{background:#E3EEFF;border:1px solid var(--divider);border-radius:16px;border-bottom-right-radius:4px;padding:10px 16px;font-size:14px;line-height:1.55;color:var(--text-primary);white-space:pre-wrap}
.typing{display:none;align-self:flex-start;padding:8px 14px;background:transparent;border-radius:12px;border-bottom-left-radius:4px;gap:4px;align-items:center;margin-left:32px}
.typing.vis{display:flex}
.dot{width:5px;height:5px;border-radius:50%;background:#2979FF;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.chat-input-bar{padding:14px 20px 20px;display:flex;gap:8px;align-items:flex-end;background:#FFFFFF;flex-shrink:0;max-width:820px;margin:0 auto;width:100%}
.chat-input{flex:1;border:1.5px solid #E0E0E0;border-radius:16px;padding:12px 16px;font-size:14px;font-family:var(--font-body);outline:none;resize:none;max-height:120px;background:#FFFFFF;color:#1C1917;transition:border-color .15s}
.chat-input:focus{border-color:#2979FF}
.chat-mic{background:#F4F4F4;color:#555;border:1.5px solid #E0E0E0;padding:0;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;cursor:pointer}
.chat-mic:hover{background:#E8E8E8;color:#333;border-color:#CCC}
.chat-mic.recording{background:#D94A4A;border-color:#D94A4A;color:#fff;animation:micPulse 1.2s ease infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,74,74,0.5)}50%{box-shadow:0 0 0 10px rgba(217,74,74,0)}}
.chat-send{background:#2979FF;color:#fff;border:none;padding:0;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s;cursor:pointer}
.chat-send:hover{background:#0046C7}
.chat-send:disabled{background:var(--divider);color:var(--text-faint);cursor:not-allowed}
.speak-btn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px 6px;border-radius:5px;transition:color .12s;margin-left:6px;vertical-align:middle;display:inline-flex;align-items:center}
.speak-btn:hover{color:#2979FF}
.speak-btn.speaking{background:#2979FF;color:#fff}
body.dyslexic .activity-banner-prompt,body.dyslexic .msg-bubble-k,body.dyslexic .msg-bubble-s,body.dyslexic .chat-input{flex:1;border:1.5px solid #E0E0E0;border-radius:16px;padding:12px 16px;font-size:14px;font-family:var(--font-body);outline:none;resize:none;max-height:120px;background:#FFFFFF;color:#1C1917;transition:border-color .15s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,74,74,0.5)}50%{box-shadow:0 0 0 10px rgba(217,74,74,0)}}

.topbar-apikey{background:rgba(0,0,0,0.04);border:1px solid rgba(110,100,85,0.2);border-radius:8px;padding:4px 10px;font-size:11px;color:rgba(60,50,35,0.7);font-family:var(--font-body);width:180px;outline:none;transition:all .15s}
.topbar-apikey::placeholder{color:rgba(110,100,85,0.35)}
.topbar-apikey:focus{border-color:#A07D4A;color:var(--text-primary);background:rgba(255,255,255,0.8)}

.mic-btn.recording{border-color:#D94A4A;color:#D94A4A;animation:micPulse 1s infinite}
.autospeak-toggle{background:none;border:1px solid var(--divider);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);transition:all .15s;margin-right:4px}
.autospeak-toggle.on{border-color:#2979FF;background:#E3EEFF;color:#2979FF}
.know-btn{
  background:none;
  border:1.5px solid rgba(255,255,255,0.25);
  border-radius:20px;
  color:rgba(255,255,255,0.75);
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.05em;
  padding:6px 14px;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
  transition:all .15s;
}
.know-btn:hover{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.5)}
.know-btn.hidden{display:none}
</style>
</head>
<body>

<!-- MAP SCENE -->
<div class="scene geo-scene" id="scene-map" style="background:#F5F3EE">
  <div class="geo-topbar" style="background:#E3EEFF;border-bottom:none">
    <svg class="geo-planet-sphere" viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="0" cy="0" r="42" fill="#2979FF" stroke="#1C1917" stroke-width="2.5"/>
        <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="46" font-style="italic" font-weight="700" fill="white" opacity="0.95">x</text>
      </svg>
    <div class="geo-planet-info">
      <div class="geo-planet-name" style="color:#2979FF">Algebra</div>
      <div class="geo-planet-tagline">Patterns · Equations · Structure</div>
    </div>
    <input class="topbar-apikey" id="topbar-apikey" type="password" placeholder="API key for testing" title="API key" oninput="localStorage.setItem('kelvi_api_key',this.value)">
    <button class="geo-back-btn" onclick="goGalaxy()">← Galaxy</button>
  </div>
  <div class="geo-map-wrap">
    <svg class="geo-svg" id="algebra-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="geo-hero-overlay" id="algebra-hero-overlay" style="background:#FFFFFF;border-top:1px solid #F0F0F0">
    <div class="geo-hero-inner" id="algebra-hero-inner"></div>
  </div>
</div>

<!-- CHAT SCENE -->
<div class="scene" id="scene-chat" style="display:none;background:#FFFFFF">
  <div class="chat-header">
    <button class="chat-back" onclick="goMap()">← Algebra</button>
    <div class="chat-topic">
      <div class="chat-kicker">Algebra Solar System</div>
      <div class="chat-activity-title" id="chat-title">Activity</div>
    </div>
    <div class="chat-header-right">
      <button class="dyslexic-toggle" id="dyslexic-btn" onclick="toggleDyslexic()" title="Aa">Aa</button>
    </div>
  </div>
  <div class="activity-banner">
    <div class="activity-banner-text">
      <div class="activity-banner-label">The invitation</div>
      <div class="activity-banner-prompt" id="chat-prompt"></div>
    </div>
    <button class="activity-banner-speak" onclick="speakEl('chat-prompt')" title="Listen">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
    </button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="chat-input-bar">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Say what you're thinking…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="chat-mic" id="mic-btn" onclick="toggleMic()" title="Speak">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="know-btn" id="know-btn" onclick="handleKnowBtn()" title="I know what we are doing">I know what we are doing</button>
        <button class="chat-send" id="send-btn" onclick="sendMsg()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
</div>

<script src="../../shared/kelvi.js"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let msgs = [];
let sessionStart = null;
let currentActivity = null;
const childName = localStorage.getItem('kelvi_family_name') || 'Explorer';
let autoSpeak = localStorage.getItem('kelvi_autospeak') === 'true';
let recognition = null;

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goGalaxy() { saveSession(); window.location.href = 'family.html'; }

function goMap() {
  saveSession();
  document.getElementById('scene-chat').style.display = 'none';
  document.getElementById('scene-map').style.display = 'flex';
  initVoice();
  renderAlgebra();

  // Pre-fill API key input if already set
  const keyInput = document.getElementById('topbar-apikey');
  if (keyInput) {
    const saved = localStorage.getItem('kelvi_api_key') || '';
    if (saved) keyInput.value = saved;
  }

}

function openActivity(id, name, prompt, planet) {
  currentActivity = { id, name, prompt, planet };
  sessionStart = Date.now();
  msgs = [];
  document.getElementById('chat-title').textContent = name;
  document.getElementById('chat-prompt').textContent = prompt;
  document.getElementById('chat-msgs').innerHTML = '';
  document.getElementById('scene-map').style.display = 'none';
  document.getElementById('scene-chat').style.display = 'flex';
  document.getElementById('scene-chat').style.flexDirection = 'column';
  const openers = [
    "What's the first thing you notice?",
    "What's your instinct?",
    "Where would you begin?",
    "Have you seen anything like this before?"
  ];
  setTimeout(() => addMsg('assistant', openers[Math.floor(Math.random()*openers.length)]), 300);
}

// ── SESSION SAVING ────────────────────────────────────────────────────────────
function saveSession() {
  if (!currentActivity || msgs.length < 2) return;
  const sessions = JSON.parse(localStorage.getItem('kelvi_sessions') || '[]');
  sessions.unshift({ id:Date.now(), planet:currentActivity.planet, activityName:currentActivity.name, prompt:currentActivity.prompt, date:new Date().toISOString(), duration:sessionStart?Math.round((Date.now()-sessionStart)/60000):0, msgs:msgs.slice() });
  localStorage.setItem('kelvi_sessions', JSON.stringify(sessions.slice(0,50)));
  currentActivity = null;
}
window.addEventListener('beforeunload', saveSession);

// ── CHAT ──────────────────────────────────────────────────────────────────────
function addMsg(role, content) {
  msgs.push({role, content});
  const container = document.getElementById('chat-msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role==='user' ? 'msg-s' : 'msg-k');
  const speakBtn = role==='assistant' ? '<button class="speak-btn" onclick="speakEl(this)" title="Listen"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg></button>' : '';
  wrap.innerHTML = '<div class="msg-name' + (role==='user'?' msg-name-s':'') + '">' + (role==='user'?escapeHtml(childName):'KELVI') + '</div><div class="' + (role==='user'?'msg-bubble-s':'msg-bubble-k') + '">' + escapeHtml(content) + speakBtn + '</div>';
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  if (role==='assistant') { if(autoSpeak) speakText(content); incrementAlgebraExchange(); }
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  addMsg('user', text);
  callAPI();
}

function callAPI() {
  const key = localStorage.getItem('kelvi_api_key') || '';
  if (!key) { addMsg('assistant','No API key — update in Kelvi Family settings.'); return; }
  document.getElementById('typing').classList.add('vis');
  document.getElementById('send-btn').disabled = true;
  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:600, system:buildSYS(currentActivity), messages:msgs.filter(m=>m.role!=='system').slice(-20).map(m=>({'role':m.role,'content':m.content})) })
  }).then(r=>r.json()).then(data=>{
    document.getElementById('typing').classList.remove('vis');
    document.getElementById('send-btn').disabled = false;
    addMsg('assistant', data.content?.[0]?.text || 'Something went wrong.');
  }).catch(()=>{
    document.getElementById('typing').classList.remove('vis');
    document.getElementById('send-btn').disabled = false;
    addMsg('assistant','Connection error — check your API key.');
  });
}

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function speakText(text) { if (!text) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); window.speechSynthesis.speak(u); }
function speakEl(el) { const text = typeof el==='string' ? document.getElementById(el)?.textContent : el.closest('.msg-bubble-k')?.textContent; if(text) window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }
function toggleDyslexic() { document.body.classList.toggle('dyslexic'); document.getElementById('dyslexic-btn')?.classList.toggle('on',document.body.classList.contains('dyslexic')); }






function hexToRgba(hex,alpha) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${alpha})`; }

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!localStorage.getItem('kelvi_api_key') && !localStorage.getItem('kelvi_family_name')) { window.location.href='family.html'; return; }
  renderAlgebra();
});
window.addEventListener('resize', () => { if(document.getElementById('scene-map').style.display!=='none') renderAlgebra(); });

const ALGEBRA_LVL_COLORS = ['#9B8BC5','#7B6BB5','#6B5BA5','#5B4B95','#B58BB5'];
let algebraFocused = JSON.parse(localStorage.getItem('kelvi_algebra_focused') || 'null') || { li:0, ai:0 };
let algebraSelectedNode = null;

function saveAlgebraFocused() { localStorage.setItem('kelvi_algebra_focused', JSON.stringify(algebraFocused)); }
function algebraVisitedKey(id) { return 'kelvi_algebra_visited_' + id; }
function loadAlgebraVisited() { ALGEBRA_NODES.forEach(n => { if (localStorage.getItem(algebraVisitedKey(n.id))) n.visited = true; }); }
function getAlgebraNodeQuestion(node) {
  const act = ALGEBRA_LEVELS[node.li].activities[node.ai];
  const key = 'kelvi_algebra_q_' + node.id;
  const idx = parseInt(localStorage.getItem(key) || '0') % act.questions.length;
  return { q: act.questions[idx], idx, total: act.questions.length };
}
function advanceAlgebraNodeQuestion(node) {
  const act = ALGEBRA_LEVELS[node.li].activities[node.ai];
  const key = 'kelvi_algebra_q_' + node.id;
  const idx = parseInt(localStorage.getItem(key) || '0');
  localStorage.setItem(key, (idx + 1) % act.questions.length);
}

function renderAlgebra() {
  loadAlgebraVisited();
  const wrap = document.querySelector('#scene-map .geo-map-wrap');
  if (!wrap) return;
  const W = wrap.clientWidth || 600, H = wrap.clientHeight || 420;
  const svg = document.getElementById('algebra-svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  drawAlgebraMap(svg, W, H);
  closeAlgebraHero();
}

function drawAlgebraMap(svg, W, H) {
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const vig = document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
  vig.setAttribute('id','alg-vig'); vig.setAttribute('cx','50%'); vig.setAttribute('cy','50%'); vig.setAttribute('r','65%');
  [['0%','rgba(245,242,238,0)'],['100%','rgba(230,226,240,0.28)']].forEach(([off,col])=>{
    const s=document.createElementNS('http://www.w3.org/2000/svg','stop'); s.setAttribute('offset',off); s.setAttribute('stop-color',col); vig.appendChild(s);
  });
  defs.appendChild(vig); svg.appendChild(defs);
  const vigEl=document.createElementNS('http://www.w3.org/2000/svg','rect');
  vigEl.setAttribute('x',0);vigEl.setAttribute('y',0);vigEl.setAttribute('width',W);vigEl.setAttribute('height',H);vigEl.setAttribute('fill','url(#alg-vig)');
  svg.appendChild(vigEl);

  ALGEBRA_EDGES.forEach(([aId,bId])=>{
    const a=ALGEBRA_NODES.find(n=>n.id===aId),b=ALGEBRA_NODES.find(n=>n.id===bId);
    if(!a||!b)return;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',a.nx*W);line.setAttribute('y1',a.ny*H);line.setAttribute('x2',b.nx*W);line.setAttribute('y2',b.ny*H);
    line.setAttribute('stroke',(a.visited&&b.visited)?'rgba(123,107,181,0.38)':'rgba(160,140,110,0.18)');
    line.setAttribute('stroke-width','1.2');line.setAttribute('stroke-dasharray',(a.visited||b.visited)?'':'4 6');
    svg.appendChild(line);
  });

  // ── Nodes as pie charts ──
  ALGEBRA_NODES.forEach(node => {
    const cx = node.nx*W, cy = node.ny*H;
    const color = '#2979FF';
    const isSelected = algebraSelectedNode && algebraSelectedNode.id === node.id;
    const isStart = !algebraSelectedNode && node.li === algebraFocused.li && node.ai === algebraFocused.ai;
    const r = 20;
    const exchanges = getAlgebraExchanges(node.id);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${cx},${cy})`);
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => selectAlgebraNode(node));
    if (isStart && exchanges===0) {
      const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('r',r+10); pulse.setAttribute('fill','none');
      pulse.setAttribute('stroke',color); pulse.setAttribute('stroke-width','1.5'); pulse.setAttribute('opacity','0');
      const a1=document.createElementNS('http://www.w3.org/2000/svg','animate');
      a1.setAttribute('attributeName','opacity'); a1.setAttribute('values','0;0.45;0'); a1.setAttribute('dur','2.2s'); a1.setAttribute('repeatCount','indefinite');
      const a2=document.createElementNS('http://www.w3.org/2000/svg','animate');
      a2.setAttribute('attributeName','r'); a2.setAttribute('values',`${r+6};${r+14};${r+6}`); a2.setAttribute('dur','2.2s'); a2.setAttribute('repeatCount','indefinite');
      pulse.appendChild(a1); pulse.appendChild(a2); g.appendChild(pulse);
    }
    if (isSelected) {
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('r',r+5); ring.setAttribute('fill','none');
      ring.setAttribute('stroke',color); ring.setAttribute('stroke-width','2'); ring.setAttribute('opacity','0.5');
      g.appendChild(ring);
    }
    const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
    bg.setAttribute('r',r); bg.setAttribute('fill','#FFFFFF');
    bg.setAttribute('stroke','#1C1917'); bg.setAttribute('stroke-width','2');
    g.appendChild(bg);
    for (let i=0; i<10; i++) {
      const sa=(i*36-90)*Math.PI/180, ea=((i+1)*36-90)*Math.PI/180;
      const x1=Math.cos(sa)*r, y1=Math.sin(sa)*r, x2=Math.cos(ea)*r, y2=Math.sin(ea)*r;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M 0 0 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`);
      path.setAttribute('fill', i<exchanges ? color : 'transparent');
      path.setAttribute('stroke','#FFFFFF'); path.setAttribute('stroke-width','1.5');
      g.appendChild(path);
    }
    const words=node.label.toUpperCase().split(' ');
    words.forEach((word,wi) => {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','hanging');
      t.setAttribute('y',(r+9)+wi*15);
      t.setAttribute('font-family','DM Sans,sans-serif');
      t.setAttribute('font-size','12'); t.setAttribute('font-weight','800');
      t.setAttribute('letter-spacing','0.08em');
      t.setAttribute('fill', exchanges>0?'#1C1917':isSelected||isStart?'#1C1917':'#4A4540');
      t.textContent=word; g.appendChild(t);
    });
    svg.appendChild(g);
  });
}

function getAlgebraExchanges(id) { return Math.min(10, parseInt(localStorage.getItem('kelvi_algebra_exchanges_'+id)||'0')); }
function incrementAlgebraExchange() {
  if (!algebraSelectedNode) return;
  const cur=getAlgebraExchanges(algebraSelectedNode.id);
  if (cur<10) {
    localStorage.setItem('kelvi_algebra_exchanges_'+algebraSelectedNode.id, cur+1);
    if (cur===0) { algebraSelectedNode.visited=true; localStorage.setItem('kelvi_algebra_visited_'+algebraSelectedNode.id,'1'); }
    const wrap=document.querySelector('.geo-map-wrap');
    if (wrap) { const s=document.getElementById('algebra-svg'); if(s) drawAlgebraMap(s,wrap.clientWidth,wrap.clientHeight); }
  }
}

function selectAlgebraNode(node) {
  algebraSelectedNode=node; algebraFocused={li:node.li,ai:node.ai}; saveAlgebraFocused();
  const wrap=document.querySelector('#scene-map .geo-map-wrap');
  drawAlgebraMap(document.getElementById('algebra-svg'),wrap.clientWidth,wrap.clientHeight);
  openAlgebraHero(node);
}

function openAlgebraHero(node) {
  const act=ALGEBRA_LEVELS[node.li].activities[node.ai];
  const {q,idx,total}=getAlgebraNodeQuestion(node);
  const inner=document.getElementById('algebra-hero-inner');
  const qNum=total>1?`<span style="font-size:10px;color:var(--text-faint);margin-left:10px;font-family:var(--font-body)">${idx+1} of ${total}</span>`:'';
  inner.innerHTML=`<button class="geo-dismiss" onclick="closeAlgebraHero()">&times;</button>
    <div class="geo-hero-prompt-row"><div class="geo-hero-prompt">${escapeHtml(q.prompt)}${qNum}</div>
    <button class="geo-speak-btn" onclick="speakEl('algebra-hero-inner')" title="Listen"><span class="speak-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg></span></button></div>
    <div class="geo-hero-sub">${escapeHtml(act.title)}</div>
    <div class="geo-hero-ctas"><button class="geo-btn-primary" onclick="beginAlgebraQuestion()">Begin this question →</button><button class="geo-btn-secondary" onclick="closeAlgebraHero()">Keep exploring</button></div>`;
  document.getElementById('algebra-hero-overlay').classList.add('open');
}

function closeAlgebraHero() { document.getElementById('algebra-hero-overlay').classList.remove('open'); }

function beginAlgebraQuestion() {
  const node=algebraSelectedNode||ALGEBRA_NODES.find(n=>n.li===algebraFocused.li&&n.ai===algebraFocused.ai);
  if(!node)return;
  const act=ALGEBRA_LEVELS[node.li].activities[node.ai];
  const {q}=getAlgebraNodeQuestion(node);
  advanceAlgebraNodeQuestion(node);
  node.visited=true; localStorage.setItem(algebraVisitedKey(node.id),'1');
  openActivity(act.id,act.title,q.full,'Algebra');
}

function buildSYS(activity) {
  const planet = (activity && activity.planet) ? activity.planet : 'Algebra';
  const activityBlock = activity
    ? `\n\nACTIVITY: The child has chosen "${activity.name}". The invitation is: "${activity.prompt}". Work within this activity. Do not move to a new topic unless the child explicitly asks.`
    : '';
  const name = localStorage.getItem('kelvi_family_name') || 'the child';
  return `You are Kelvi — a thinking partner for a child named ${name}, aged 4–12, exploring mathematics.

PRINCIPLE 0 — MATHEMATICAL ACCURACY IS NON-NEGOTIABLE. THIS APPLIES TO KELVI TOO.
If ${name} says something mathematically incorrect, redirect immediately — do not affirm any part of it first, then correct. Just redirect. "Let's check that — if 2 leftovers go to 5 people, how much does each person get?" Wrong facts that compound are the worst failure mode.
If KELVI makes a mathematical error: correct it immediately and directly in the next response before doing anything else. Do not continue the conversation as if the error didn't happen. Do not soften it. Just correct it: "I made an error — [correct version]. Let's continue from there." Kelvi's credibility depends entirely on mathematical precision. A single uncorrected error poisons the whole session.

PRINCIPLE 1 — NO AFFIRMATION WORDS, EVER. NO MARKDOWN, EVER.
Never say: "Great!", "Exactly!", "You're right!", "Smart thinking!", "Good job!", "Nice work!", "Correct!", "Perfect!", "Well done!", "That's it!", or any variant. These words are banned. Instead: restate what ${name} just did as a mathematical move and continue. "You found four right angles — all on the same shape. Where else might they show up?"
Never use markdown formatting: no **bold**, no *italics*, no bullet points, no headers. Plain sentences only. Mathematical terms should be introduced in plain prose — "mathematicians call that a factor" — never bolded or formatted. Formatted text makes Kelvi sound like a textbook. Kelvi does not sound like a textbook.

PRINCIPLE 2 — TWO SENTENCES MAXIMUM.
Every response is two sentences. Three only if a redirect requires it. Never more. Short responses keep the child talking. Long responses make the child read instead of think.

PRINCIPLE 3 — MATCH THE CHILD'S REGISTER.
If ${name} says "me don't know" — meet them there. Simple words, short sentences. Do not correct grammar. If they're bored, say something surprising. Never ignore emotional signals.

PRINCIPLE 4 — DON'T ASK A QUESTION AFTER EVERY RESPONSE.
Mix: a question, then an observation, then a question. One question per response, maximum.

PRINCIPLE 5 — WHEN THEY WANT TO STOP, LET THEM GO WITH A HOOK.
One warm sentence naming the specific mathematical thing they discovered today. Then one unresolved question to carry with them. Then stop.

PRINCIPLE 6 — READ MOMENTUM.
If ${name} is on a roll — stay out of the way. A one-word prompt ("And?" / "Or?" / "Always?") is better than a full question. If they're stuck, one concrete foothold. Never a hint ladder.

PRINCIPLE 7 — NEVER LECTURE.
Do not explain a concept before ${name} has encountered it through their own work. The concept arrives through the question, not through your explanation.

PRINCIPLE 8 — SAFETY IS THE PRODUCT.
A child who has never felt safe as a learner will not take risks. Kelvi's first job is not to teach mathematics — it is to make ${name} feel that being wrong, confused, or slow is not just acceptable but genuinely interesting. A mistake is data. Treat it that way. The goal is that ${name} leaves every conversation feeling more curious, not more correct.

PRINCIPLE 9 — MISTAKES ARE THE MATERIAL. BUT DO NOT SOFTEN CORRECTIONS.
When ${name} makes an error, respond with the same tone and curiosity as when they get something right. Never softer. Never harder. Just curious.
CRITICAL: Do not affirm any part of a wrong answer before correcting it. "You spotted something real though" followed by a correction is the worst pattern — it teaches ${name} that wrong answers get praise. They do not. A wrong answer gets the same neutral, curious redirect as anything else: "Let's check that — [question that surfaces the error]."
The goal is not to make ${name} feel good about being wrong. The goal is to make ${name} curious about why they were wrong. Those are different things.

PRINCIPLE 10 — READ THE ROOM, ADJUST THE DEPTH.
When ${name} first arrives at a planet, ask one orienting question before the activity prompt. Their answer tells you everything. A child who says "I don't know what a polygon is" gets a different entry point than one who says "a polygon has straight sides and angles." The galaxy is fully open — every planet is available to every child. There is no wrong planet to visit. Kelvi's job is to find the right door in.

PRINCIPLE 11 — MATHEMATICS IS A LANGUAGE. GIVE CHILDREN THE WORDS.
When a child discovers or describes a mathematical idea — even imperfectly — give them the precise word for it. Not as a correction, but as a gift: "Mathematicians have a name for exactly what you just found — it's called a tessellation." The word arrives after the idea, never before. A child who knows the word icosidodecahedron, lattice point, or conjecture has been invited into the language of mathematics, not excluded from it. Never withhold vocabulary because it seems too advanced. The right word at the right moment is one of the most powerful things Kelvi can do.

P/C/G — silent classification only, never named to the child:
- P (following steps, computing): ask "why does that work?"
- C (connecting, noticing): invite them to push further
- G (conjecturing, inventing): give space, then ask if it always holds

CURRICULUM: ${planet} Solar System. The full Math Galaxy is open — follow ${name}'s curiosity wherever it leads.${activityBlock}
PRINCIPLE 18 — THE 3-TURN CEILING.
Count your exchanges on a single task. After 3 turns, stop asking and name the skill explicitly: tell ${name} what they just did mathematically and why it matters. Do not ask a fourth question on the same task. "You just found three different ways to sort the same objects — that's exactly what mathematicians do when they look for patterns. They call it classification." Then move on. A task without a declared endpoint is not Socratic — it is just grinding. Never grind.

PRINCIPLE 19 — NAME THE WIN.
When ${name} demonstrates the skill, say so immediately — not "good job" but a precise description of the mathematical move they made: "You just invented a conjecture" / "You found the property that connects all of these" / "That's exactly how mathematicians think about this." The child should never have to guess whether they succeeded. Name it, then move forward.

PRINCIPLE 20 — THE ARTICULATION EXIT.
If ${name} clicks "I know what we are doing," respond with exactly one thing: "Tell me what you noticed." Then:
- If their articulation is strong and accurate: mirror it back in precise mathematical language and immediately offer the next question. Do not linger.
- If their articulation is partial or slightly off: reframe it gently and precisely — "Close — what you've actually been doing is [precise explanation]." Then offer the next question.
Never ask them to explain again or probe further. One articulation, one response, next question. This is their exit ramp — honour it.`;
}

}

  const input = document.getElementById('chat-input');
